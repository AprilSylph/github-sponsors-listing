name: Main

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  run:
    name: Run
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    steps:
      - name: Checkout branch gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Hard-reset to origin/main
        run: git reset --hard origin/main

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Fetch GitHub Sponsors listing
        run: |
          npm ci
          npm start

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force ./index.json
          git commit --message "Update GitHub Sponsors listing"

      - name: Push changes
        run: git push --force
