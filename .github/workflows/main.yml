name: Main

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  run:
    name: Run
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reset to main
        run: git reset --hard origin/main

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch sponsors listing data
        run: npm start

      - name: Commit changes
        run: |
          git add --force ./index.json
          git commit -m "Add sponsors listing data"

      - name: Push changes
        run: git push --force
